[build-system]
requires = ["poetry-core>=1.0.0", "poetry-dynamic-versioning>=1.0.0,<2.0.0"]
build-backend = "poetry_dynamic_versioning.backend"

[tool.poetry]
name = "pyberny"
version = "0.0.0"
description = "Molecular/crystal structure optimizer"
readme = "README.md"
authors = ["Jan Hermann <dev@jan.hermann.name>"]
repository = "https://github.com/jhrmnn/pyberny"
documentation = "https://jhrmnn.github.io/pyberny"
license = "MPL-2.0"
packages = [
    { include = "berny", from = "src" },
]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Operating System :: POSIX",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Physics",
]

[tool.poetry.dependencies]
python = "^3.9"
numpy = ">=1.15,<3"
pytest = { version = ">=6", optional = true }
coverage = { version = ">=6", optional = true }
sphinx = { version = ">=5", optional = true }
sphinxcontrib-katex = { version = ">=0.9", optional = true }
toml = { version = ">=0.10", optional = true }

[tool.poetry.extras]
test = ["pytest", "coverage"]
doc = ["sphinx", "sphinxcontrib-katex", "toml"]

[tool.poetry.group.dev.dependencies]
flake8 = ">=5"
flake8-bugbear = ">=22"
flake8-comprehensions = ">=3"
black = ">=22"
pep8-naming = ">=0.13"
isort = ">=5"
pydocstyle = ">=6"

[tool.poetry.scripts]
berny = "berny.cli:main"

[tool.poetry-dynamic-versioning]
enable = true
dirty = true
pattern = '^(?P<base>\d+\.\d+\.\d+)$'

[tool.black]
target-version = ["py39"]
skip-string-normalization = true
