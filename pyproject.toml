[build-system]
requires = ["poetry-core>=1.0.0", "poetry-dynamic-versioning>=1.0.0,<2.0.0"]
build-backend = "poetry_dynamic_versioning.backend"

[tool.poetry]
name = "pyberny"
version = "0.0.0"
description = "Molecular/crystal structure optimizer"
readme = "README.md"
authors = ["Jan Hermann <dev@jan.hermann.name>"]
repository = "https://github.com/jhrmnn/pyberny"
documentation = "https://jhrmnn.github.io/pyberny"
license = "MPL-2.0"
packages = [
    { include = "berny", from = "src" },
]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Operating System :: POSIX",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Physics",
]

[tool.poetry.dependencies]
python = "^3.9"
numpy = ">=1.15,<3"
pytest = { version = ">=6", optional = true }
coverage = { version = ">=6", optional = true }
sphinx = { version = ">=5,<8", optional = true }
sphinxcontrib-katex = { version = ">=0.9", optional = true }
sphinx-multiversion = { version = ">=0.2", optional = true }
toml = { version = ">=0.10", optional = true }
pyscf = { version = ">=2.5", optional = true }
matplotlib = { version = ">=3.5", optional = true }

[tool.poetry.extras]
test = ["pytest", "coverage"]
doc = ["sphinx", "sphinxcontrib-katex", "sphinx-multiversion", "toml"]
benchmark = ["pyscf"]
plot = ["matplotlib"]

[tool.poetry.group.dev.dependencies]
ruff = ">=0.6"
black = ">=22"
mypy = ">=1"

[tool.poetry.scripts]
berny = "berny.cli:main"

[tool.poetry-dynamic-versioning]
enable = true
dirty = true
pattern = '^(?P<base>\d+\.\d+\.\d+)$'

[tool.black]
target-version = ["py39"]
skip-string-normalization = true
force-exclude = "experiments/"

[tool.mypy]
python_version = "3.9"
files = ["src/berny"]

[[tool.mypy.overrides]]
module = ["numpy", "numpy.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
filterwarnings = ["ignore::PendingDeprecationWarning"]
testpaths = ["tests"]

[tool.ruff]
line-length = 80
extend-exclude = ["experiments"]
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "C90",
    "N",
    "B",
    "C4",
    "I",
    "UP",
    "SIM",
    "PIE",
    "RET",
    "PT",
    "RUF",
    "NPY",
]
ignore = [
    "E501",  # line length handled by black
    "E741",  # ambiguous variable name
    "E203",  # whitespace before punctuation (black-compatible)
    "N802",  # function name should be lowercase
    "N803",  # argument name should be lowercase
    "N806",  # variable in function should be lowercase
    "N999",  # invalid module name (Math.py is intentional)
    "B905",  # zip() without explicit strict=
]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "typing",
    "third-party",
    "first-party",
    "local-folder",
]
no-lines-before = ["typing"]
combine-as-imports = true

[tool.ruff.lint.isort.sections]
typing = ["typing", "typing_extensions"]

[tool.coverage.run]
branch = true
source = ["berny"]
