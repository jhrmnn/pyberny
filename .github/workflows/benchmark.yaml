name: Benchmark
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Which benchmark to run'
        type: choice
        # birkholz-fast drops easc (~90 s on its own under mopac) and rebatches
        # the remaining 18 mopac molecules into 3 bins of ~25 s each; combined
        # with `solver: mopac` it doubles as the cheap auto-trigger on
        # push/pull_request. pyscf has no fast/full distinction -- its shards
        # are identical for both birkholz-fast and birkholz-full. baker is
        # workflow_dispatch only until baseline step counts are seeded into
        # tests/data/baker_shajan_2023/reference.json.
        options:
          - birkholz-fast
          - birkholz-full
          - baker
        default: birkholz-fast
      solver:
        description: 'Which solver(s) to use'
        type: choice
        options:
          - mopac
          - pyscf
          - both
        default: mopac
      molecules:
        description: 'Subset of molecule names (space-separated; empty = all)'
        type: string
        default: ''

jobs:
  # Build the benchmark matrix dynamically so off-axis shards (e.g. all
  # pyscf shards when `inputs.solver == 'mopac'`) and shards with no
  # molecule overlap with `inputs.molecules` are not instantiated at all.
  # A static matrix with per-step `if:` gates would still produce green
  # check-mark jobs for the skipped shards, which is misleading.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      - name: Build benchmark matrix
        id: plan
        env:
          # `inputs.*` are empty on push / pull_request; fall back to
          # birkholz-fast + mopac so the auto-trigger stays cheap.
          BENCHMARK: ${{ inputs.benchmark || 'birkholz-fast' }}
          SOLVER: ${{ inputs.solver || 'mopac' }}
          SUBSET: ${{ inputs.molecules }}
        # Generated by scripts/plan_batches.py.
        # Cost = measured single energy+gradient call × pyberny step count.
        # Rerun (per solver, since --nbins and --exclude differ) and paste a
        # fresh block if reference.json changes:
        #   python scripts/plan_batches.py --solvers mopac
        #   python scripts/plan_batches.py --solvers mopac \
        #     --exclude easc --nbins 3      # fast-mopac batches
        #   python scripts/plan_batches.py --solvers pyscf \
        #     --exclude azadirachtin --nbins 7
        # pyscf excludes azadirachtin: ~526s/call × 77 paper_steps ≈ 11 h,
        # which busts GitHub's 360-min job cap. It still runs under mopac.
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import json, os
          mopac_fast = [
              {"solver": "mopac", "batch_id": "b0", "molecules": "inosine_cation mg_porphin penicillin_v artemisinin ochratoxin_a sphingomyelin"},
              {"solver": "mopac", "batch_id": "b1", "molecules": "bisphenol_a diisobutyl_phthalate estradiol cetirizine tamoxifen azadirachtin"},
              {"solver": "mopac", "batch_id": "b2", "molecules": "vitamin_c zn_edta codeine avobenzone maltose raffinose"},
          ]
          mopac_full = [
              {"solver": "mopac", "batch_id": "b0", "molecules": "easc"},
              {"solver": "mopac", "batch_id": "b1", "molecules": "vitamin_c inosine_cation zn_edta bisphenol_a mg_porphin penicillin_v diisobutyl_phthalate artemisinin codeine estradiol avobenzone ochratoxin_a maltose cetirizine tamoxifen raffinose sphingomyelin azadirachtin"},
          ]
          pyscf = [
              {"solver": "pyscf", "batch_id": "b0", "molecules": "easc"},
              {"solver": "pyscf", "batch_id": "b1", "molecules": "raffinose"},
              {"solver": "pyscf", "batch_id": "b2", "molecules": "sphingomyelin"},
              {"solver": "pyscf", "batch_id": "b3", "molecules": "vitamin_c inosine_cation tamoxifen"},
              {"solver": "pyscf", "batch_id": "b4", "molecules": "zn_edta bisphenol_a mg_porphin cetirizine"},
              {"solver": "pyscf", "batch_id": "b5", "molecules": "penicillin_v diisobutyl_phthalate estradiol avobenzone"},
              {"solver": "pyscf", "batch_id": "b6", "molecules": "artemisinin codeine ochratoxin_a maltose"},
          ]
          # All 30 Baker molecules are small organics; no measured cost data
          # yet, so split alphabetically into roughly-equal bins. Rebalance
          # once a baseline run records per-row wall times.
          baker_mopac = [
              {"solver": "mopac", "batch_id": "b0", "molecules": "acanil01 acetone acetylene achtar10 allene ammonia benzaldehyde benzene benzidine caffeine difluorobenzene_13 difluoronaphthalene_15 difuropyrazine dimethylpentane disilyl_ether"},
              {"solver": "mopac", "batch_id": "b1", "molecules": "ethane ethanol furan histidine hydroxybicyclopentane_2 hydroxysulfane menthone mesityl_oxide methylamine naphthalene neopentane pterin trifluorobenzene_135 trisilacyclohexane_135 water"},
          ]
          baker_pyscf = [
              {"solver": "pyscf", "batch_id": "b0", "molecules": "acanil01 acetone acetylene achtar10 allene ammonia benzaldehyde benzene benzidine caffeine"},
              {"solver": "pyscf", "batch_id": "b1", "molecules": "difluorobenzene_13 difluoronaphthalene_15 difuropyrazine dimethylpentane disilyl_ether ethane ethanol furan histidine hydroxybicyclopentane_2"},
              {"solver": "pyscf", "batch_id": "b2", "molecules": "hydroxysulfane menthone mesityl_oxide methylamine naphthalene neopentane pterin trifluorobenzene_135 trisilacyclohexane_135 water"},
          ]
          # The "benchmark" key on each shard is consumed below to set the
          # --benchmark flag on benchmark.py and threads through to the
          # aggregate step's --benchmark / artifact-name suffix.
          for s in mopac_fast + mopac_full + pyscf:
              s["benchmark"] = "birkholz"
          for s in baker_mopac + baker_pyscf:
              s["benchmark"] = "baker"
          # (benchmark, solver) -> ordered list of shard pools to pull from.
          # pyscf has no fast/full distinction; both birkholz-* benchmarks
          # use the same `pyscf` pool when solver is pyscf or both.
          pools_by_axes = {
              ("birkholz-fast", "mopac"): [mopac_fast],
              ("birkholz-fast", "pyscf"): [pyscf],
              ("birkholz-fast", "both"):  [mopac_fast, pyscf],
              ("birkholz-full", "mopac"): [mopac_full],
              ("birkholz-full", "pyscf"): [pyscf],
              ("birkholz-full", "both"):  [mopac_full, pyscf],
              ("baker",         "mopac"): [baker_mopac],
              ("baker",         "pyscf"): [baker_pyscf],
              ("baker",         "both"):  [baker_mopac, baker_pyscf],
          }
          benchmark = os.environ["BENCHMARK"]
          solver = os.environ["SOLVER"]
          subset = os.environ["SUBSET"].split()
          shards = [s for pool in pools_by_axes[(benchmark, solver)] for s in pool]
          include = []
          for shard in shards:
              shard_mols = shard["molecules"].split()
              mols = [m for m in shard_mols if m in subset] if subset else shard_mols
              if not mols:
                  continue
              include.append({**shard, "molecules": " ".join(mols)})
          print("matrix=" + json.dumps({"include": include}))
          print("has_jobs=" + ("true" if include else "false"))
          PY

  benchmark:
    needs: setup
    if: needs.setup.outputs.has_jobs == 'true'
    name: ${{ matrix.benchmark }} ${{ matrix.solver }} ${{ matrix.batch_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 350  # under GitHub's 360-min job cap
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin numeric-library threads to physical cores
        run: |
          n=$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)
          echo "Detected $n physical cores on this runner."
          echo "OMP_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "MKL_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "OPENBLAS_NUM_THREADS=$n" >> "$GITHUB_ENV"
      - name: Install MOPAC
        if: matrix.solver == 'mopac'
        run: |
          mkdir mopac
          cd mopac
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV
        env:
          MOPAC_VERSION: 23.2.5
      - name: Install pyberny
        run: |
          if [ "${{ matrix.solver }}" = "mopac" ]; then
            pip install -e .
          else
            pip install -e '.[benchmark]'
          fi
      - name: Run batch
        env:
          BENCHMARK: ${{ matrix.benchmark }}
          SOLVER: ${{ matrix.solver }}
          BATCH: ${{ matrix.batch_id }}
          MOLS: ${{ matrix.molecules }}
        run: |
          mkdir -p results
          read -ra mols <<< "$MOLS"
          python scripts/benchmark.py --benchmark "$BENCHMARK" \
            --solver "$SOLVER" \
            --molecules "${mols[@]}" \
            --out-json "results/${SOLVER}-${BATCH}.json"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.benchmark }}-${{ matrix.solver }}-${{ matrix.batch_id }}
          path: results/

  aggregate:
    needs: benchmark
    # Skip aggregation when `benchmark` itself was skipped (empty matrix);
    # otherwise still run so partial results aggregate even on failures.
    if: always() && needs.benchmark.result != 'cancelled' && needs.benchmark.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: benchmark-results-*
          merge-multiple: true
      - name: Install pyberny
        # aggregate_benchmark.py imports format_table from scripts/benchmark.py,
        # which top-level-imports `berny`. Plain install (no benchmark extra).
        run: pip install -e .
      - name: Aggregate
        # aggregate_benchmark.py silently skips solvers with no shard files,
        # so passing both unconditionally is safe across every `solver` axis.
        # birkholz-fast and birkholz-full share the same reference.json, so
        # both map to --benchmark=birkholz; the baker axis maps to baker.
        env:
          BENCHMARK: ${{ inputs.benchmark || 'birkholz-fast' }}
        run: |
          mkdir -p results
          case "$BENCHMARK" in
            baker)      bench=baker ;;
            birkholz-*) bench=birkholz ;;
          esac
          python scripts/aggregate_benchmark.py \
            --benchmark "$bench" \
            --results-dir all-results \
            --solvers mopac pyscf
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: results/summary-*.md
