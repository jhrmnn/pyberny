name: Benchmark
on:
  workflow_dispatch:
    inputs:
      solver:
        description: 'Which solver to run'
        type: choice
        options: [mopac, pyscf, both]
        default: mopac
      molecules:
        description: 'Subset of molecule names (space-separated; empty = all)'
        type: string
        default: ''

jobs:
  benchmark:
    name: ${{ matrix.solver }} ${{ matrix.batch_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 350  # under GitHub's 360-min job cap
    strategy:
      fail-fast: false
      matrix:
        # Generated by scripts/plan_batches.py.
        # Cost = measured single energy+gradient call × pyberny step count.
        # Rerun the script and paste a fresh block if reference.json changes.
        include:
          - { solver: mopac, batch_id: b0, molecules: easc }
          - { solver: mopac, batch_id: b1, molecules: vitamin_c inosine_cation zn_edta bisphenol_a mg_porphin penicillin_v diisobutyl_phthalate artemisinin codeine estradiol avobenzone ochratoxin_a maltose cetirizine tamoxifen raffinose sphingomyelin azadirachtin }
          - { solver: pyscf, batch_id: b0, molecules: azadirachtin }
          - { solver: pyscf, batch_id: b1, molecules: easc zn_edta bisphenol_a mg_porphin penicillin_v artemisinin estradiol ochratoxin_a cetirizine tamoxifen }
          - { solver: pyscf, batch_id: b2, molecules: vitamin_c inosine_cation diisobutyl_phthalate codeine avobenzone maltose raffinose sphingomyelin }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # `matrix` context isn't available in `jobs.<id>.if`, so we filter
      # off-solver shards here instead and gate every subsequent step on
      # the result. Same logic handles an empty intersection with
      # `inputs.molecules`.
      - name: Decide whether this shard runs
        id: gate
        env:
          SHARD_SOLVER: ${{ matrix.solver }}
          SHARD_MOLS: ${{ matrix.molecules }}
          INPUT_SOLVER: ${{ inputs.solver }}
          SUBSET: ${{ inputs.molecules }}
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import os
          shard_solver = os.environ['SHARD_SOLVER']
          input_solver = os.environ['INPUT_SOLVER']
          shard = os.environ['SHARD_MOLS'].split()
          subset = os.environ['SUBSET'].split()
          solver_match = input_solver in (shard_solver, 'both')
          mols = [m for m in shard if m in subset] if subset else shard
          skip = not (solver_match and mols)
          print(f"mols={' '.join(mols)}")
          print(f"skip={'true' if skip else 'false'}")
          PY
      - name: Pin numeric-library threads to physical cores
        if: steps.gate.outputs.skip == 'false'
        run: |
          n=$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)
          echo "Detected $n physical cores on this runner."
          echo "OMP_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "MKL_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "OPENBLAS_NUM_THREADS=$n" >> "$GITHUB_ENV"
      - name: Install MOPAC
        if: steps.gate.outputs.skip == 'false' && matrix.solver == 'mopac'
        run: |
          mkdir mopac
          cd mopac
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV
        env:
          MOPAC_VERSION: 23.2.5
      - name: Install pyberny
        if: steps.gate.outputs.skip == 'false'
        run: |
          if [ "${{ matrix.solver }}" = "mopac" ]; then
            pip install -e .
          else
            pip install -e '.[benchmark]'
          fi
      - name: Run batch
        if: steps.gate.outputs.skip == 'false'
        env:
          SOLVER: ${{ matrix.solver }}
          BATCH: ${{ matrix.batch_id }}
          MOLS: ${{ steps.gate.outputs.mols }}
        run: |
          mkdir -p results
          read -ra mols <<< "$MOLS"
          echo "## $SOLVER batch $BATCH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python scripts/benchmark.py --solver "$SOLVER" \
            --molecules "${mols[@]}" \
            --out "results/${SOLVER}-${BATCH}.md" \
            --out-json "results/${SOLVER}-${BATCH}.json"
          cat "results/${SOLVER}-${BATCH}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always() && steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.solver }}-${{ matrix.batch_id }}
          path: results/

  aggregate:
    needs: benchmark
    if: always() && needs.benchmark.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: benchmark-results-*
          merge-multiple: true
      - name: Install pyberny
        # aggregate_benchmark.py imports format_table from scripts/benchmark.py,
        # which top-level-imports `berny`. Plain install (no benchmark extra).
        run: pip install -e .
      - name: Aggregate
        env:
          SOLVERS: ${{ inputs.solver == 'both' && 'mopac pyscf' || inputs.solver }}
        run: |
          mkdir -p results
          python scripts/aggregate_benchmark.py \
            --results-dir all-results \
            --solvers $SOLVERS
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: results/summary.md
