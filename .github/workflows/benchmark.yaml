name: Benchmark
on:
  workflow_dispatch:
    inputs:
      solver:
        description: 'Which solver to run'
        type: choice
        options: [mopac, pyscf, both]
        default: mopac
      molecules:
        description: 'Subset of molecule names (space-separated; empty = all)'
        type: string
        default: ''

jobs:
  benchmark:
    name: ${{ matrix.solver }} ${{ matrix.batch_id }}
    if: matrix.solver == inputs.solver || inputs.solver == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 350  # under GitHub's 360-min job cap
    strategy:
      fail-fast: false
      matrix:
        # Generated by scripts/plan_batches.py (cost model:
        # mopac ~ N^2 * pm7_steps; pyscf ~ N^4 * paper_steps).
        # Rerun the script and paste a fresh block if reference.json changes.
        include:
          - { solver: mopac, batch_id: b0, molecules: "sphingomyelin" }
          - { solver: mopac, batch_id: b1, molecules: "artemisinin azadirachtin" }
          - { solver: mopac, batch_id: b2, molecules: "easc mg_porphin penicillin_v raffinose" }
          - { solver: mopac, batch_id: b3, molecules: "inosine_cation zn_edta bisphenol_a estradiol ochratoxin_a tamoxifen" }
          - { solver: mopac, batch_id: b4, molecules: "vitamin_c diisobutyl_phthalate codeine avobenzone maltose cetirizine" }
          - { solver: pyscf, batch_id: b0, molecules: "azadirachtin" }
          - { solver: pyscf, batch_id: b1, molecules: "vitamin_c easc inosine_cation bisphenol_a zn_edta mg_porphin penicillin_v diisobutyl_phthalate artemisinin codeine estradiol avobenzone maltose ochratoxin_a cetirizine tamoxifen raffinose sphingomyelin" }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin numeric-library threads to physical cores
        run: |
          n=$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)
          echo "Detected $n physical cores on this runner."
          echo "OMP_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "MKL_NUM_THREADS=$n" >> "$GITHUB_ENV"
          echo "OPENBLAS_NUM_THREADS=$n" >> "$GITHUB_ENV"
      - name: Install MOPAC
        if: matrix.solver == 'mopac'
        run: |
          mkdir mopac
          cd mopac
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV
        env:
          MOPAC_VERSION: 23.2.5
      - name: Install pyberny
        run: |
          if [ "${{ matrix.solver }}" = "mopac" ]; then
            pip install -e .
          else
            pip install -e '.[benchmark]'
          fi
      - name: Compute molecules for this shard
        id: mols
        env:
          SHARD_MOLS: ${{ matrix.molecules }}
          SUBSET: ${{ inputs.molecules }}
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import os
          shard = os.environ['SHARD_MOLS'].split()
          subset = os.environ['SUBSET'].split()
          mols = [m for m in shard if m in subset] if subset else shard
          print(f"mols={' '.join(mols)}")
          print(f"skip={'true' if not mols else 'false'}")
          PY
      - name: Run batch
        if: steps.mols.outputs.skip == 'false'
        env:
          SOLVER: ${{ matrix.solver }}
          BATCH: ${{ matrix.batch_id }}
          MOLS: ${{ steps.mols.outputs.mols }}
        run: |
          mkdir -p results
          read -ra mols <<< "$MOLS"
          echo "## $SOLVER batch $BATCH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python scripts/benchmark.py --solver "$SOLVER" \
            --molecules "${mols[@]}" \
            --out "results/${SOLVER}-${BATCH}.md" \
            --out-json "results/${SOLVER}-${BATCH}.json"
          cat "results/${SOLVER}-${BATCH}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always() && steps.mols.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.solver }}-${{ matrix.batch_id }}
          path: results/

  aggregate:
    needs: benchmark
    if: always() && needs.benchmark.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: benchmark-results-*
          merge-multiple: true
      - name: Aggregate
        env:
          SOLVERS: ${{ inputs.solver == 'both' && 'mopac pyscf' || inputs.solver }}
        run: |
          mkdir -p results
          python scripts/aggregate_benchmark.py \
            --results-dir all-results \
            --solvers $SOLVERS
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: results/summary.md
