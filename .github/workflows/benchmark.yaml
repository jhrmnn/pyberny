name: Benchmark
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which benchmark to run'
        type: choice
        # fast-mopac drops easc (~90 s on its own) and rebatches the remaining
        # 18 mopac molecules into 3 bins of ~25 s each, so it can serve as
        # the auto-trigger on push/pull_request without holding up CI.
        options: [fast-mopac, full-mopac, pyscf, both]
        default: fast-mopac
      molecules:
        description: 'Subset of molecule names (space-separated; empty = all)'
        type: string
        default: ''

jobs:
  # Build the benchmark matrix dynamically so off-mode shards (e.g. all
  # pyscf shards when `inputs.mode == 'fast-mopac'`) and shards with no
  # molecule overlap with `inputs.molecules` are not instantiated at all.
  # A static matrix with per-step `if:` gates would still produce green
  # check-mark jobs for the skipped shards, which is misleading. Keep the
  # actual benchmark fan-out inside one job so only the aggregate check shows
  # up in the PR status-check list.
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # under GitHub's 360-min job cap
    steps:
      - name: Build benchmark matrix
        id: plan
        env:
          # `inputs.mode` is empty on push / pull_request; fall back to the
          # fast-mopac batch set so the auto-trigger stays cheap.
          MODE: ${{ inputs.mode || 'fast-mopac' }}
          SUBSET: ${{ inputs.molecules }}
        # Generated by scripts/plan_batches.py.
        # Cost = measured single energy+gradient call × pyberny step count.
        # Rerun (per solver, since --nbins and --exclude differ) and paste a
        # fresh block if reference.json changes:
        #   python scripts/plan_batches.py --solvers mopac
        #   python scripts/plan_batches.py --solvers mopac \
        #     --exclude easc --nbins 3      # fast-mopac batches
        #   python scripts/plan_batches.py --solvers pyscf \
        #     --exclude azadirachtin --nbins 7
        # pyscf excludes azadirachtin: ~526s/call × 77 paper_steps ≈ 11 h,
        # which busts GitHub's 360-min job cap. It still runs under mopac.
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import json, os
          mopac_fast = [
              {"solver": "mopac", "batch_id": "b0", "molecules": "inosine_cation mg_porphin penicillin_v artemisinin ochratoxin_a sphingomyelin"},
              {"solver": "mopac", "batch_id": "b1", "molecules": "bisphenol_a diisobutyl_phthalate estradiol cetirizine tamoxifen azadirachtin"},
              {"solver": "mopac", "batch_id": "b2", "molecules": "vitamin_c zn_edta codeine avobenzone maltose raffinose"},
          ]
          mopac_full = [
              {"solver": "mopac", "batch_id": "b0", "molecules": "easc"},
              {"solver": "mopac", "batch_id": "b1", "molecules": "vitamin_c inosine_cation zn_edta bisphenol_a mg_porphin penicillin_v diisobutyl_phthalate artemisinin codeine estradiol avobenzone ochratoxin_a maltose cetirizine tamoxifen raffinose sphingomyelin azadirachtin"},
          ]
          pyscf = [
              {"solver": "pyscf", "batch_id": "b0", "molecules": "easc"},
              {"solver": "pyscf", "batch_id": "b1", "molecules": "raffinose"},
              {"solver": "pyscf", "batch_id": "b2", "molecules": "sphingomyelin"},
              {"solver": "pyscf", "batch_id": "b3", "molecules": "vitamin_c inosine_cation tamoxifen"},
              {"solver": "pyscf", "batch_id": "b4", "molecules": "zn_edta bisphenol_a mg_porphin cetirizine"},
              {"solver": "pyscf", "batch_id": "b5", "molecules": "penicillin_v diisobutyl_phthalate estradiol avobenzone"},
              {"solver": "pyscf", "batch_id": "b6", "molecules": "artemisinin codeine ochratoxin_a maltose"},
          ]
          by_mode = {
              "fast-mopac": mopac_fast,
              "full-mopac": mopac_full,
              "pyscf": pyscf,
              "both": mopac_full + pyscf,
          }
          mode = os.environ["MODE"]
          subset = os.environ["SUBSET"].split()
          include = []
          for shard in by_mode[mode]:
              shard_mols = shard["molecules"].split()
              mols = [m for m in shard_mols if m in subset] if subset else shard_mols
              if not mols:
                  continue
              include.append({**shard, "molecules": " ".join(mols)})
          print("matrix=" + json.dumps({"include": include}))
          print("has_jobs=" + ("true" if include else "false"))
          print(
              "needs_mopac="
              + ("true" if any(s["solver"] == "mopac" for s in include) else "false")
          )
          print(
              "needs_benchmark="
              + ("true" if any(s["solver"] == "pyscf" for s in include) else "false")
          )
          PY
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Detect runner parallelism
        id: runner
        if: steps.plan.outputs.has_jobs == 'true'
        run: |
          n=$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)
          echo "Detected $n physical cores on this runner."
          echo "physical_cores=$n" >> "$GITHUB_OUTPUT"
      - name: Install MOPAC
        if: steps.plan.outputs.has_jobs == 'true' && steps.plan.outputs.needs_mopac == 'true'
        run: |
          mkdir mopac
          cd mopac
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV
        env:
          MOPAC_VERSION: 23.2.5
      - name: Install pyberny
        if: steps.plan.outputs.has_jobs == 'true'
        run: |
          if [ "${{ steps.plan.outputs.needs_benchmark }}" = "true" ]; then
            pip install -e '.[benchmark]'
          else
            pip install -e .
          fi
      - name: Run benchmark shards
        id: benchmark
        if: steps.plan.outputs.has_jobs == 'true'
        continue-on-error: true
        env:
          MATRIX_JSON: ${{ steps.plan.outputs.matrix }}
          PHYSICAL_CORES: ${{ steps.runner.outputs.physical_cores }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from pathlib import Path

          shards = json.loads(os.environ["MATRIX_JSON"])["include"]
          if not shards:
              raise SystemExit(0)

          results = Path("results")
          logs = Path("logs")
          results.mkdir(exist_ok=True)
          logs.mkdir(exist_ok=True)

          parallel = max(1, min(int(os.environ["PHYSICAL_CORES"]), len(shards)))
          print(f"Running {len(shards)} shard(s) with parallelism={parallel}", flush=True)

          env = os.environ.copy()
          env["OMP_NUM_THREADS"] = "1"
          env["MKL_NUM_THREADS"] = "1"
          env["OPENBLAS_NUM_THREADS"] = "1"
          env["PYTHONUNBUFFERED"] = "1"

          queue = list(shards)
          running = []
          failed = []

          def start(shard):
              stem = f'{shard["solver"]}-{shard["batch_id"]}'
              log_path = logs / f"{stem}.log"
              cmd = [
                  sys.executable,
                  "scripts/benchmark.py",
                  "--solver",
                  shard["solver"],
                  "--molecules",
                  *shard["molecules"].split(),
                  "--out-json",
                  str(results / f"{stem}.json"),
              ]
              handle = log_path.open("w")
              proc = subprocess.Popen(cmd, stdout=handle, stderr=subprocess.STDOUT, env=env)
              print(f"Started {stem}: {shard['molecules']}", flush=True)
              running.append((stem, log_path, handle, proc))

          while queue or running:
              while queue and len(running) < parallel:
                  start(queue.pop(0))
              time.sleep(5)
              still_running = []
              for stem, log_path, handle, proc in running:
                  rc = proc.poll()
                  if rc is None:
                      still_running.append((stem, log_path, handle, proc))
                      continue
                  handle.close()
                  if rc:
                      failed.append((stem, log_path))
                      print(f"::error::{stem} failed with exit code {rc}")
                      tail = log_path.read_text(errors="replace").splitlines()[-200:]
                      print(f"::group::{stem} log tail")
                      for line in tail:
                          print(line)
                      print("::endgroup::")
                  else:
                      print(f"Finished {stem}", flush=True)
              running = still_running

          if failed:
              print("\nFailed shard(s):", file=sys.stderr)
              for stem, log_path in failed:
                  print(f"  {stem} (see {log_path})", file=sys.stderr)
              raise SystemExit(1)
          PY
      - name: Note empty selection
        if: steps.plan.outputs.has_jobs != 'true'
        run: |
          echo "No benchmark shards matched the selected mode/molecules." >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results/
            logs/
          if-no-files-found: ignore
      - name: Aggregate
        id: aggregate
        # aggregate_benchmark.py silently skips solvers with no shard files,
        # so passing both unconditionally is safe across every `mode`.
        if: always() && steps.plan.outputs.has_jobs == 'true'
        continue-on-error: true
        run: |
          python scripts/aggregate_benchmark.py \
            --results-dir results \
            --solvers mopac pyscf
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: results/summary.md
          if-no-files-found: ignore
      - name: Fail workflow on shard or aggregate errors
        if: always() && (steps.benchmark.outcome == 'failure' || steps.aggregate.outcome == 'failure')
        run: exit 1
