name: Documentation
on:
  push:
    branches: [master]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[doc]"
      - name: Check
        # SPHINX_KATEX_PRERENDER turns on server-side KaTeX rendering so a
        # math parse error fails the build (see doc/conf.py). Not set on the
        # sphinx-multiversion step below, which rebuilds historical refs
        # whose source we can't retroactively fix.
        env:
          SPHINX_KATEX_PRERENDER: "1"
        run: sphinx-build -W -E doc doc/_check
      - name: Build
        run: sphinx-multiversion doc doc/build
      - name: Add Pages metadata
        run: |
          touch doc/build/.nojekyll
          cat >doc/build/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=master/">
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: doc/build
