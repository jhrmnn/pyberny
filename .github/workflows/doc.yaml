name: Documentation
on:
  push:
    branches: [master]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[doc]"
      - name: Debug versions
        run: |
          which node && node --version
          which sphinx-build && sphinx-build --version
          python -c "import sphinx, alabaster, sphinxcontrib.katex as k; print('sphinx', sphinx.__version__); print('alabaster', alabaster.__version__); print('katex', k.__version__)"
      - name: Check
        run: sphinx-build -W --keep-going -E doc doc/_check 2>&1 | tee /tmp/sphinx.log
        continue-on-error: true
      - name: Dump sphinx log
        if: always()
        run: cat /tmp/sphinx.log 2>/dev/null || echo "no log"
      - name: Build
        run: sphinx-multiversion doc doc/build
      - name: Add Pages metadata
        run: |
          touch doc/build/.nojekyll
          cat >doc/build/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=master/">
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: doc/build
