name: Documentation
on:
  push:
    branches: [master]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[doc]"
      - name: Check
        # Single-version sphinx build of the PR's own source, with strict
        # KaTeX prerender (see doc/conf.py). SPHINX_KATEX_PRERENDER is NOT
        # set on the multiversion Build step below — sphinx-multiversion
        # reuses this conf.py against historical refs whose math we can't
        # retroactively patch.
        env:
          SPHINX_KATEX_PRERENDER: "1"
        run: sphinx-build -W -E doc doc/_check
      - name: Build
        # Multi-version build of master + tags. Runs on every event so
        # config/extension breakage that only manifests against historical
        # refs is caught at PR time. The artifact upload below is gated on
        # push events because only those drive the Deploy Docs workflow.
        run: sphinx-multiversion doc doc/build
      - name: Add Pages metadata
        if: github.event_name == 'push'
        run: |
          touch doc/build/.nojekyll
          cat >doc/build/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=master/">
          EOF
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: docs
          path: doc/build
