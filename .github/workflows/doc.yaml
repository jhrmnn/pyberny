name: Documentation
on:
  push:
    branches: [master]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          # Populate external/oligomer-benchmarks so the molecule gallery can
          # embed the oligomers set (it is silently omitted when absent).
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[doc]"
      - name: Check
        # Single-version sphinx build of the PR's own source, with strict
        # KaTeX prerender (see doc/conf.py). Multi-version build only runs
        # on push events below, so prerender can be unconditional.
        run: sphinx-build -W -E doc doc/_check
      - name: Build
        if: github.event_name == 'push'
        run: sphinx-multiversion doc doc/build
      - name: Add Pages metadata
        if: github.event_name == 'push'
        run: |
          touch doc/build/.nojekyll
          cat >doc/build/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=master/">
          EOF
      - name: Build molecule gallery
        if: github.event_name == 'push'
        run: python scripts/molecule_gallery.py -o doc/build/molecules.html
      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: docs
          path: doc/build
