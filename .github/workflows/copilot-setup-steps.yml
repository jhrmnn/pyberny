name: "Copilot Setup Steps"

# Run on changes to this file so it can be validated, and allow manual dispatch.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        # Login shell so the conda environment created below is auto-activated
        # for every step (and for the agent's own shell).
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      # The xtb bindings (berny.solvers.XTBSolver) have no reliable PyPI wheel,
      # so the agent's Python comes from conda-forge with xtb-python preinstalled
      # (plus typing-extensions, which xtb-python imports but does not depend on).
      # This makes XTBSolver importable in agent sessions; pyberny and its other
      # dependencies are pip-installed into this same environment below.
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: pyberny
          create-args: >-
            python=3.12
            xtb-python
            typing-extensions
          init-shell: bash

      # Node is required by sphinxcontrib-katex's server-side prerender,
      # which scripts/check.sh and .github/workflows/doc.yaml both run.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # MOPAC is required by tests/test_optimize.py, which shells out to the
      # `mopac` binary. Install it OUTSIDE the repository checkout (under
      # $RUNNER_TEMP) so the extracted files are never picked up by `git add`
      # in the agent's working tree.
      - name: Install MOPAC
        env:
          MOPAC_VERSION: 23.2.5
        run: |
          mkdir -p "$RUNNER_TEMP/mopac"
          cd "$RUNNER_TEMP/mopac"
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          rm mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV

      - name: Install project with test and doc extras
        run: pip install -e ".[test,doc]"

      # Lint tools used by .github/workflows/lint.yaml so `ruff`, `black`,
      # and `mypy` are available without a network round-trip.
      - name: Install lint tools
        run: pip install ruff black mypy
