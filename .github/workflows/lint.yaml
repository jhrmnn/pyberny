name: Lint
on:
  push:
    branches: [master]
  pull_request:
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        # Pinned: the lint config enables ruff preview rules, which change
        # between releases, so an unpinned install would break CI on unrelated
        # PRs whenever a new ruff ships. Bump deliberately (keep in sync with
        # the dev dependency in pyproject.toml).
        run: pip install ruff==0.15.18
      - run: ruff check .
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install black
      - run: black . --check
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # Match the interpreter to mypy's target (`python_version` in
          # pyproject.toml), our lowest supported version. The installed NumPy
          # then matches that floor too: newer NumPy (>=2.5) is 3.12-only and
          # ships PEP 695 `type` stubs that mypy rejects when targeting 3.10,
          # so checking on a newer interpreter pulls stubs mypy can't parse.
          python-version: "3.10"
      - name: Install dependencies
        # Install the package so mypy picks up bundled NumPy stubs and our own
        # type hints via the installed module rather than just the source tree.
        run: pip install -e . mypy
      - run: mypy
