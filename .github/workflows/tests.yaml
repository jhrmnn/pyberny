name: Tests
on:
  push:
    branches: [master]
  pull_request:
jobs:
  all:
    name: All
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MOPAC
        run: |
          mkdir mopac
          cd mopac
          wget -q https://github.com/openmopac/mopac/releases/download/v${MOPAC_VERSION}/mopac-${MOPAC_VERSION}-linux.tar.gz
          tar --strip-components=1 -xzf mopac-${MOPAC_VERSION}-linux.tar.gz
          echo "$PWD/bin" >>$GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PWD/lib" >>$GITHUB_ENV
        env:
          MOPAC_VERSION: 23.2.5
      - name: Install
        run: pip install -e ".[test]"
      - name: Test
        run: coverage run -m pytest -v
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # The xtb bindings have no reliable PyPI wheel and build from source
  # otherwise (needs LAPACK), so the real xtb-backed solver is smoke-tested in
  # a dedicated conda-forge environment. The pip matrix above covers the
  # solver's code paths with a fake bindings module; this job confirms it
  # works against the actual xtb library. Coverage is left to the pip jobs.
  xtb:
    name: xtb (conda-forge)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: xtb
          create-args: >-
            python=3.12
            xtb-python
            typing-extensions
          init-shell: bash
      - name: Install
        run: pip install -e ".[test]"
      - name: Test
        run: pytest -v -k xtb
